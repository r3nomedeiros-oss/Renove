<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 100px;
            color: white;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon svg {
            width: 50px;
            height: 50px;
        }
        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 28px;
            opacity: 0.9;
            margin-bottom: 60px;
        }
        .cards {
            display: flex;
            gap: 30px;
        }
        .card {
            background: rgba(255,255,255,0.15);
            padding: 30px;
            border-radius: 16px;
            width: 280px;
        }
        .card-label {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 28px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M12 2L2 7v10l10 5 10-5V7l-10-5zm0 2.18l6.9 3.45L12 11.09 5.1 7.63 12 4.18zM4 8.55l7 3.5v7.4l-7-3.5v-7.4zm9 10.9v-7.4l7-3.5v7.4l-7 3.5z"/>
            </svg>
        </div>
    </div>
    <h1>PolyTrack</h1>
    <p class="subtitle">Sistema de Controle de Produção de Sacolas</p>
    <div class="cards">
        <div class="card">
            <div class="card-label">Produção</div>
            <div class="card-value">Dashboard</div>
        </div>
        <div class="card">
            <div class="card-label">Controle</div>
            <div class="card-value">Lançamentos</div>
        </div>
        <div class="card">
            <div class="card-label">Análise</div>
            <div class="card-value">Relatórios</div>
        </div>
    </div>
</body>
</html>
