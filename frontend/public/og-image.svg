<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Logo/Icon -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="white" opacity="0.2"/>
    <path d="M20 50 L40 30 L60 50 L40 70 Z" fill="white"/>
    <rect x="35" y="25" width="10" height="30" fill="#1e3a5f"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="230" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="700" fill="white">
    PolyTrack
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="290" font-family="Inter, Arial, sans-serif" font-size="28" fill="white" opacity="0.9">
    Sistema de Controle de Produção de Sacolas
  </text>
  
  <!-- Stats Cards -->
  <g transform="translate(100, 380)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="280" height="120" rx="12" fill="white" opacity="0.15"/>
    <text x="30" y="45" font-family="Inter, Arial, sans-serif" font-size="18" fill="white" opacity="0.8">Produção</text>
    <text x="30" y="90" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="white">Dashboard</text>
    
    <!-- Card 2 -->
    <rect x="310" y="0" width="280" height="120" rx="12" fill="white" opacity="0.15"/>
    <text x="340" y="45" font-family="Inter, Arial, sans-serif" font-size="18" fill="white" opacity="0.8">Controle</text>
    <text x="340" y="90" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="white">Lançamentos</text>
    
    <!-- Card 3 -->
    <rect x="620" y="0" width="280" height="120" rx="12" fill="white" opacity="0.15"/>
    <text x="650" y="45" font-family="Inter, Arial, sans-serif" font-size="18" fill="white" opacity="0.8">Análise</text>
    <text x="650" y="90" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="white">Relatórios</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="150" r="100" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="200" r="150" fill="white" opacity="0.03"/>
</svg>
